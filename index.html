<html lang="it">
<head>

    <!-- Configurazione tema Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: { 50: '#fcfaf7', 100: '#f3f0eb', 200: '#e5e0d8', 800: '#1c1917', 900: '#0c0a09' },

    <style>
        body { 
            background-color: #fcfaf7; 
            color: #1c1917; 
            overflow: hidden; 
            font-size: 1.25rem;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 25%;
            background: white;
            border-right: 2px solid #f3f0eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
            justify-content: space-between;
        }

        .main-content {
            width: 75%;
            padding: 2.5rem;
            overflow-y: auto;
            background: #fcfaf7;
        }

        .menu-card { 
            border: 2px solid #e5e0d8; 
            background: #ffffff;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px -2px rgba(0, 0, 0, 0.05);
            aspect-ratio: 1.1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
        }
        .menu-card:active, .menu-card:hover { 
            transform: scale(1.03); 
            border-color: #92400e;
            background: #fef3c7; 
        }
        .menu-card i { font-size: 2.5rem; }
        .menu-card span { font-size: 0.9rem; font-weight: 900; line-height: 1.1; }

        .view-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-view { opacity: 0; pointer-events: none; transform: translateX(50px); display: none; }
        .active-view { opacity: 1; pointer-events: auto; transform: translateX(0); display: block; }

        h1, h2 { font-family: 'Georgia', serif; }
        
        /* Link stilizzati come bottoni per TV */
        .map-link, .whatsapp-btn, .partner-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin: 5px 0;
            background-color: #f3f0eb;
            color: #78350f;
            border: 1px solid #e5e0d8;
            transition: all 0.2s;
        }
        .map-link:hover, .whatsapp-btn:hover { background-color: #e5e0d8; }

        .partner-link { background-color: #78350f; color: white; border: none; width: 100%; justify-content: center; padding: 16px; font-size: 1rem; }
        .whatsapp-partner-link { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background-color: #25D366; color: white; padding: 16px; border-radius: 15px; 
            text-align: center; margin: 1rem 0; font-weight: 800; font-size: 1.1rem;
        }

        .whatsapp-btn { background-color: #25D366; color: white; border: none; }

        .google-map-iframe {
            width: 100%;
            height: 100%;
            min-height: 480px;
            border-radius: 2rem;
            border: 4px solid #e5e0d8;
        }

        #tv-clock {
            font-size: 2.8rem;
            font-weight: 900;
            color: #1c1917;
            margin-top: 0.5rem;
        }

        @keyframes pulse-music {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #92400e; }
            100% { transform: scale(1); }
        }
        .music-active { animation: pulse-music 2s infinite ease-in-out; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #e5e0d8; border-radius: 4px; }
    </style>
</head>

        let currentLang = 'it';
        let isMusicPlaying = false;

        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('tv-clock').textContent = `${hh}:${mm}`;
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('tv-date').textContent = now.toLocaleDateString(currentLang === 'it' ? 'it-IT' : 'en-US', options);
        }

        function initApp() {
            renderDashboard();
            updateUIText();
            setInterval(updateClock, 1000);
            updateClock();
            
            const audio = document.getElementById('bg-music');
            const musicToggle = document.getElementById('music-toggle');
            const musicIcon = document.getElementById('music-icon');
            
            audio.volume = 0.15;

            const playAudio = async () => {
                if (isMusicPlaying) return;
                try {
                    await audio.play();
                    musicIcon.className = "fas fa-volume-up text-amber-800";
                    musicToggle.classList.add('music-active');
                    isMusicPlaying = true;
                } catch (e) { 
                    console.log("Autoplay bloccato o errore audio."); 
                }
            };

            // Listener globale per far partire la musica al primo clic ovunque (necessario per policy browser)
            document.addEventListener('click', playAudio, { once: true });
            document.addEventListener('touchstart', playAudio, { once: true });

            document.getElementById('lang-toggle').onclick = () => {
                currentLang = currentLang === 'it' ? 'en' : 'it';
                updateUIText();
                renderDashboard();
                updateClock();
                if(!document.getElementById('detail-view').classList.contains('hidden-view')) {
                    openDetail(document.getElementById('detail-view').dataset.activeId);
                }
            };

            musicToggle.onclick = (e) => {
                e.stopPropagation(); // Evita di triggerare il listener globale se si clicca direttamente qui
                if (isMusicPlaying) {
                    audio.pause();
                    musicIcon.className = "fas fa-music";
                    musicToggle.classList.remove('music-active');
                    isMusicPlaying = false;
                } else {
                    playAudio();
                }
            };

            document.getElementById('back-btn').onclick = closeDetail;
        }

        function renderDashboard() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const order = ['rules', 'wifi', 'maps', 'check', 'parking', 'beaches', 'excursions', 'appliances', 'food', 'shopping', 'transport', 'emergency'];
            
            order.forEach(id => {
                const item = appData[id];
                const card = document.createElement('button');
                card.className = "menu-card rounded-[1.5rem]";
                card.onclick = () => openDetail(item.id);
                card.innerHTML = `
                    <div class="text-amber-800"><i class="fas ${item.icon}"></i></div>
                    <span class="uppercase tracking-tighter text-center">${item.title[currentLang]}</span>
                `;
                grid.appendChild(card);
            });
        }

        function updateUIText() {
            document.getElementById('lang-text').textContent = currentLang === 'it' ? "ENGLISH VERSION" : "VERSIONE ITALIANA";
            document.getElementById('ui-back').textContent = currentLang === 'it' ? "Torna indietro" : "Back";
            document.getElementById('review-btn-text').textContent = currentLang === 'it' ? "Recensioni" : "Reviews";
            document.getElementById('privacy-btn-text').textContent = currentLang === 'it' ? "Privacy" : "Privacy";
            document.getElementById('dash-title').textContent = currentLang === 'it' ? "Cosa desideri fare?" : "How can we help you?";
        }

        function openDetail(id) {
            const data = appData[id];
            const detailView = document.getElementById('detail-view');
            detailView.dataset.activeId = id;
            
            document.getElementById('detail-title').textContent = data.title[currentLang];
            document.getElementById('detail-icon').innerHTML = `<i class="fas ${data.icon}"></i>`;
            document.getElementById('section-intro').textContent = data.intro[currentLang];
            document.getElementById('detail-content').innerHTML = data.content[currentLang];
            
            const mapContainer = document.getElementById('map-container');
            if(data.hasMap) {
                mapContainer.classList.remove('hidden');
                document.getElementById('map-iframe').src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3027.69707172828!2d14.3807213!3d40.622543!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x133b99435f377505%3A0xc33e1644917a256!2sVia%20Atigliana%2C%2019%2C%2080067%20Sorrento%20NA!5e0!3m2!1sit!2sit!4v1710599000000!5m2!1sit!2sit";
            } else {
                mapContainer.classList.add('hidden');
            }
            
            document.getElementById('qr-container').classList.toggle('hidden', !data.hasQR);
            document.getElementById('dashboard-view').classList.add('hidden-view');
            detailView.classList.remove('hidden-view');
            detailView.classList.add('active-view');
        }

        function closeDetail() {
            document.getElementById('detail-view').classList.remove('active-view');
            document.getElementById('detail-view').classList.add('hidden-view');
            document.getElementById('dashboard-view').classList.remove('hidden-view');
            document.getElementById('dashboard-view').classList.add('active-view');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
